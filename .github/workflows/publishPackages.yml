name: Build, test and publish

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      unlist_deprecated:
        description: 'Unlist every published version of the deprecated ghost packages (ApiClient, Story, Scheduler, Guards) on nuget.org'
        type: boolean
        default: false

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Restore workload
      run: dotnet workload restore SolTechnology.Core.slnx
    - name: Restore dependencies
      run: dotnet restore SolTechnology.Core.slnx
    - name: Build
      run: dotnet build SolTechnology.Core.slnx --no-restore
    - name: Test
      shell: pwsh
      run: |
           .\.github\runTests.ps1

    - name: Guard - every packable src project is in the solution
      shell: bash
      run: |
        set -euo pipefail
        # Projects deliberately kept out of SolTechnology.Core.slnx while still packable-by-default.
        # Deprecated ids frozen for 1.0; step 07 sets <IsPackable>false>. Drop from this list once 07 lands.
        excluded="SolTechnology.Core.Scheduler SolTechnology.Core.Guards"
        slnx_projects="$(dotnet sln SolTechnology.Core.slnx list)"
        missing=0
        for csproj in src/*/*.csproj; do
          name="$(basename "$csproj" .csproj)"
          case " $excluded " in *" $name "*) continue ;; esac
          packable="$(dotnet msbuild "$csproj" -getProperty:IsPackable -nologo 2>/dev/null || echo true)"
          if [ "$(printf '%s' "$packable" | tr '[:upper:]' '[:lower:]')" = "false" ]; then
            continue
          fi
          # Match on the .csproj file name (case-insensitive): the Api folder is on disk as
          # 'SolTechnology.Core.Api' but recorded in .slnx as 'SolTechnology.Core.API'.
          if ! printf '%s\n' "$slnx_projects" | grep -qiF "/$name.csproj"; then
            echo "::error file=$csproj::Packable project '$name' is missing from SolTechnology.Core.slnx"
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then
          echo "Add the missing project(s) to SolTechnology.Core.slnx so the pack glob picks them up."
          exit 1
        fi

    - name: Pack every packable src project
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p ./artifacts
        dotnet sln SolTechnology.Core.slnx list \
          | grep -E '^src/.+\.csproj$' \
          | while read -r csproj; do
              dotnet pack -c Release -o ./artifacts "$csproj"
            done

    - name: Publish all nuget packages
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
      run: dotnet nuget push ./artifacts/*.nupkg -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json --skip-duplicate

  unlist-deprecated:
    # Manual, opt-in only: never runs on a tag or master push, so a normal release publish cannot
    # trigger an unlist. The four ghost ids below are HARDCODED (not derived from any expandable list),
    # so even a full-account NUGET_API_KEY cannot unlist a supported package (premortem scenario 6).
    if: github.event_name == 'workflow_dispatch' && inputs.unlist_deprecated
    runs-on: ubuntu-latest

    steps:
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Unlist every published version of the deprecated ghost packages
      shell: bash
      run: |
        set -euo pipefail
        # Unlist = hide from search (dotnet nuget delete). It is NOT deprecation (no CLI/API for that -
        # web UI only) and is strictly per-version, so versions are enumerated live from the
        # flat-container index - never hardcoded. Re-listing, if needed, is a manual web-UI action.
        for id in SolTechnology.Core.ApiClient SolTechnology.Core.Story \
                  SolTechnology.Core.Scheduler SolTechnology.Core.Guards; do
          lower="$(printf '%s' "$id" | tr '[:upper:]' '[:lower:]')"
          versions="$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/$lower/index.json" 2>/dev/null | jq -r '.versions[]' || true)"
          if [ -z "$versions" ]; then
            echo "No published versions for $id (already unlisted or never published) - skipping"
            continue
          fi
          for v in $versions; do
            echo "Unlisting $id $v"
            dotnet nuget delete "$id" "$v" --non-interactive \
              --api-key ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
          done
        done
